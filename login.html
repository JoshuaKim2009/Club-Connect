<!DOCTYPE html>
<html>
  <head>
    <link href="styles.css?v=31" rel="stylesheet" />
    <meta name="theme-color" id="theme-color-meta" content="#131b30">
    <link href="login.css?v=2" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Connect | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>

    <div class="chat-header">
      <button type="button" class="fancy-button" onclick="goToHome()">
        <i class="fa-solid fa-circle-left"></i>
      </button>
      <span class="chat-title">LOGIN</span>
    </div>

    <form id="loginForm">
      <div class="auth-page-wrapper">

        <div class="auth-box">
          <h1 class="auth-box-title">LOGIN</h1>
          <input type="text" class="fancy-login-input" placeholder="Email" required id="username" />
          <input type="password" class="fancy-login-input" placeholder="Password" required id="password" />
          <hr class="auth-divider">
          <button id="login-submit" type="submit" class="fancy-button">LOGIN</button>
        </div>

        <div class="auth-register-card">
          <h2 class="auth-register-card-title">REGISTER</h2>
          <p class="auth-register-card-subtitle">No account? Create one here!</p>
          <a href="register.html" class="fancy-button auth-register-card-btn">CREATE</a>
        </div>
      </div>
    </form>

    <script>
      function goToHome() {
        window.location.href = "index.html";
      }
    </script>
    <script src="theme.js?v=6"></script>
    <script type="module" src="dialog.js"></script>
    <script type="module" src="login.js?v=2" defer></script>

  </body>
</html>
