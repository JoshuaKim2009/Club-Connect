<!DOCTYPE html>
<html>
  <head>
    <link href="styles.css?v=20" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Connect | Clubs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />





    <style>
      body {
        padding-bottom: 100px;
      }
      body {
        font-family: var(--primary-font-family);
        padding-top: env(safe-area-inset-top);
        background: var(--header-bg-start);
      }
      #page-title{
        margin-top: 110px;
      }

      .join-club-box {
        margin: 15px auto;
        padding: 15px;
        border: 3px solid black;
        border-radius: 10px;
        background: linear-gradient(#cecece, #8b8b8b);
        box-shadow: 0px 4px 0px #000000;
        box-sizing: border-box;
        margin-bottom: 30px !important;
      }

      #clubContainer,
      #memberClubContainer {
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #clubs-wrapper.loaded #clubContainer,
      #clubs-wrapper.loaded #memberClubContainer {
        opacity: 1;
      }
      
      #clubs-loading-text {
        text-align: center;
        width: 100%;
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
        <div id="loading-overlay-inner">
            <div class="loading-spinner"></div>
            <p>LOADING...</p>
        </div>
    </div>
    <!-- <button id="back-button" class="fancy-button" onclick="goToHome()">HOME</button> -->

    <div class="chat-header">
        <button id="back-button" class="fancy-button" onclick="goToHome()">
          <i class="fa-solid fa-circle-left"></i>
        </button>
        <span class="chat-title">MY CLUBS</span>
      </div>
    <h1 id="page-title" class="pageTitle">MY CLUBS</h1>

    <div id="content">  

      
      <div class="join-club-box" style="margin: 15px auto; width: 85%; max-width: 630px;">
        <div class="button-container" style="margin-bottom: 0;">
          <button id="create-club-button" class="fancy-black-button">CREATE A CLUB</button>
          <button id="join-club-button" class="fancy-black-button">JOIN A CLUB</button>
          <button id="discover-club-button-main" class="fancy-black-button" onclick="window.location.href='club_discovery.html?from=your_clubs'">DISCOVER CLUBS</button>
        </div>
      </div>
      
      <div id="clubs-wrapper">
        <p id="clubs-loading-text" class="fancy-label">LOADING...</p>

        <div id="clubContainer"></div>
        <div id="memberClubContainer">
          <p id="member-clubs-loading-text" class="fancy-label"></p>
        </div>
      </div>
    </div>

    
    <div id="roleModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-button" onclick="closeRoleModal()">&times;</span>
            <h2>Set Role for <span id="modalMemberName"></span></h2>
            <div class="role-options">
                <label>
                    <input type="radio" name="memberRole" value="member" id="radioMember"> Member
                </label>
                <label>
                    <input type="radio" name="memberRole" value="admin" id="radioAdmin"> Admin
                </label>
            </div>
            <button id="saveRoleButton">Save Role</button>
            <button onclick="closeRoleModal()">Cancel</button>
        </div>
    </div>

    <script>
      const createClubButton = document.getElementById("create-club-button");
      const joinClubButton = document.getElementById("join-club-button");
      
      if (createClubButton) {
        createClubButton.addEventListener("click", function() {
          window.location.href = "create_club.html";
        });
      }
      if (joinClubButton) {
        joinClubButton.addEventListener("click", function() {
          window.location.href = "join_club.html";
        });
      }
      function goToHome(){
        window.location.href = "index.html";
      }
    </script>
    
    <script type="module" src="dialog.js"></script> 
    <script type="module" src="your_clubs.js?v=9"></script>
    <script type="module" src="loading.js?v=2"></script>
    
  </body>
</html>
