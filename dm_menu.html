<!DOCTYPE html>
<html>
  <head>
    <link href="styles.css?v=23" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Club Connect | Direct Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&display=swap" rel="stylesheet">
    <link href="dm_menu.css?v=4" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
        <div class="landscape-warning">
            <div class="landscape-warning-text">
                Please rotate your device to portrait mode
            </div>
        </div>

        <div id="loading-overlay">
            <div id="loading-overlay-inner">
                <div class="loading-spinner"></div>
                <p>LOADING...</p>
            </div>
        </div>

        <div id="new-dm-overlay" style="display: none;">
            <div id="new-dm-loading">
                <div class="loading-spinner"></div>
                <p>LOADING...</p>
            </div>
        </div>

        <!-- header outside of #content so it shows during loading -->
        <div class="chat-header">
            <button id="back-button" class="fancy-button">
                <i class="fa-solid fa-circle-left"></i>
            </button>
            <span class="chat-title">DIRECT MESSAGES</span>
        </div>

        <div id="content">
            <div id="dm-list">
                <button class="fancy-button new-dm-btn" id="newDmButton">
                    <i class="fa-solid fa-pen-to-square"></i>
                    NEW CONVERSATION
                </button>
                <!-- cards injected here -->
            </div>
        </div>

        <div id="new-dm-overlay" style="display: none;"></div>

        <div id="new-dm-modal" style="display: none;">
            <h3>CHOOSE WHO TO MESSAGE</h3>
            <div id="member-list">
                <!-- member buttons will be put here -->
            </div>
            <div class="dm-modal-actions">
                <button id="cancel-new-dm-button" class="fancy-button">CANCEL</button>
            </div>
        </div>

        <script src="theme.js"></script>
        <script type="module" src="loading.js?v=2"></script>
        <script type="module" src="dialog.js"></script>
        <script type="module" src="dm_menu.js?v=2"></script>
    </body>
</html>
