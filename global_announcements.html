<!DOCTYPE html>
<html>
  <head>
    <link href="styles.css?v=60" rel="stylesheet" />
    <meta name="theme-color" id="theme-color-meta" content="#1c375f">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Connect | Updates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            font-family: var(--primary-font-family);
            padding-top: env(safe-area-inset-top);
            background: var(--bg-dark);
            padding-bottom: 50px;
        }

        .message-link {
            color: #0066cc;
            text-decoration: underline;
            word-break: break-all;
        }
        .message-link:hover { color: #0052a3; }
        .message-link:active { color: #003d7a; }

        .club-label {
            display: inline-block;
            font-size: 0.8em;
            background: #222;
            color: #fff;
            border-radius: 5px;
            padding: 3px 7px;
            margin-bottom: 4px;
            font-family: var(--primary-font-family);
        }

        #content {
            padding-top: 99px;
        }


        .club-label--link {
          cursor: pointer;
        }

        .club-label--link:hover {
          background: #333;
        }

        .empty-state-label {
          display: block;
          margin-top: 60px;
        }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div id="loading-overlay-inner">
        <div class="loading-spinner"></div>
        <p>LOADING...</p>
      </div>
    </div>

    <div class="chat-header">
      <button id="back-button" class="fancy-button" onclick="window.location.href='index.html'">
        <i class="fa-solid fa-circle-left"></i>
      </button>
      <span class="chat-title">ALL UPDATES</span>
    </div>

    <div id="content" style="display:none;">
      <div id="announcementsContainer" class="fancy-black-label">
        <p id="noAnnouncementsMessage" style="display: none;">No announcements yet.</p>
      </div>

      <div id="pagination-controls" style="display: none;">
        <div id="pagination-inner"></div>
      </div>
    </div>

    <script src="theme.js?v=12"></script>
    <script type="module" src="dialog.js"></script>
    <script type="module" src="global_announcements.js?v=8"></script>
  </body>
</html>
