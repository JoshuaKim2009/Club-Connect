<!DOCTYPE html>
<html>
  <head>
    <link href="styles.css?v=52" rel="stylesheet" />
    <meta name="theme-color" id="theme-color-meta" content="#1c375f">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Connect | Club Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />




    
    <style>
      body {
        padding-bottom: 100px; 
      }
      body {
          font-family: var(--primary-font-family);
          padding-top: env(safe-area-inset-top);
          background: var(--bg-dark);
      }
      .icon {
        display: inline-block; 
        margin-left: 8px;
        vertical-align: middle; 
      }
      #view-members-button{
        align-items: center;
      }

      #adminActionsSection, #scheduleSection, #communicationSection {
        background: linear-gradient(#ffffff, #e2e2e2) !important;
      }

      #closestEventDisplay h3 {
        margin: 0 0 2px 0;
      }

      #closestEventDisplay p {
        margin: 2px 0;
      }

      #adminActionsSection h3,
      #communicationSection h3,
      #scheduleSection h3 {
        font-family: var(--primary-font-family);
        text-align: center;
        color: #000000;
        margin-top: 10px;
        margin-bottom: 10px;
        font-weight: normal;
      }

      #edit-club-button, #view-members-button, #links-button, #viewScheduleButton, #chatButton, #directMessagesButton, #announcementsButton, #pollsButton {
        /* max-width: min(85%, 600px) !important; */
        width: 85%;
        max-width: 325px;
      }

      #closestEventDisplay .event-card,
      .event-card-loading {
        box-sizing: border-box;
      }

      .copy-button {
        margin-left: 10px; 
      }

      .comm-icon {
        margin-bottom: 6px;
      }

    </style>
    
  </head>
  <body>
    <div id="loading-overlay">
      <div id="loading-overlay-inner">
        <div class="loading-spinner"></div>
        <p>LOADING CLUB PAGE...</p>
      </div>
    </div>

    <div class="chat-header">
      <button id="back-button" class="fancy-button" onclick="goToHome()">
        <i class="fa-solid fa-circle-left"></i>
      </button>
      <span class="chat-title">CLUB PAGE</span>
    </div>

    <div id="content">  
      <h1 id="clubPageTitle"></h1>
      <div id="clubDetails" class="fancy-label">
        <p></p>
      </div>
      <hr style="background-color: transparent; height: 6px; border: none;">

      

      <div id="adminActionsSection">
          <h3>
            CLUB OVERVIEW
          </h3>
          <div class="button-row-2">
            <button id="edit-club-button" class="fancy-button">CLUB INFO</button>
            <button id="view-members-button" class="fancy-button">
              MEMBERS
              <span id="pendingRequestsBadge" class="notification-badge"></span>
            </button>
          </div>
          <button id="links-button" class="fancy-button">LINKS & RESOURCES</button>
      </div>


      <div id="scheduleSection">
          <h3>
            CLUB SCHEDULE
          </h3>
          <div id="closestEventDisplay">
              
              <div class="event-card-loading">
                  <div class="loading-line"></div>
                  <div class="loading-line"></div>
                  <div class="loading-line"></div>
                  <div class="loading-line"></div>
                  <div class="loading-line"></div>
              </div>
                       
          </div>
          <button id="viewScheduleButton" class="fancy-button">EDIT SCHEDULE</button>
      </div>


      <div id="communicationSection">
          <h3>
            COMMUNICATION
          </h3>
          <div class="comm-grid">
            <button id="chatButton" class="fancy-button">
              <i class="comm-icon fa-solid fa-comments"></i>
              <span class="comm-lbl">GROUP CHAT</span>
              <span id="unreadMessagesBadge" class="notification-badge"></span>
            </button>
            <button id="directMessagesButton" class="fancy-button">
              <i class="comm-icon fa-solid fa-envelope"></i>
              <span class="comm-lbl">DIRECT MESSAGES</span>
              <span id="unreadDirectMessagesBadge" class="notification-badge"></span>
            </button>
            <button id="announcementsButton" class="fancy-button">
              <i class="comm-icon fa-solid fa-bullhorn"></i>
              <span class="comm-lbl">ANNOUNCEMENTS</span>
              <span id="unreadAnnouncementsBadge" class="notification-badge"></span>
            </button>
            <button id="pollsButton" class="fancy-button">
              <i class="comm-icon fa-solid fa-chart-bar"></i>
              <span class="comm-lbl">POLLS</span>
              <span id="unreadPollsBadge" class="notification-badge"></span>
            </button>
          </div>
      </div>


      
      

      
    </div>



    
    



    <script>
      function goToHome(){
        window.location.href = "your_clubs.html";
      }
    </script>

    <script src="theme.js?v=11"></script>
    <!-- <script type="module" src="loading.js?v=2"></script> -->
    <script type="module" src="dialog.js"></script> 
    <script type="module" src="club_page_manager.js?v=12"></script>
  </body>
</html>
