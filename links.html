<!DOCTYPE html>
<html>
  <head>
    <link href="styles.css?v=57" rel="stylesheet" />
    <meta name="theme-color" id="theme-color-meta" content="#1c375f">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Connect | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&display=swap" rel="stylesheet">
    <link href="links.css?v=10" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

    <style>
      body {
        font-family: var(--primary-font-family);
        padding-top: env(safe-area-inset-top);
        background: var(--bg-dark);
      }
      #noResourcesMessage {
        text-align: center;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div id="loading-overlay-inner">
        <div class="loading-spinner"></div>
        <p>LOADING...</p>
      </div>
    </div>

    <div class="chat-header">
      <button id="back-button" class="fancy-button" onclick="goToClubPage()">
        <i class="fa-solid fa-circle-left"></i>
      </button>
      <span class="chat-title">LINKS</span>
    </div>

    <div id="content">
      <h1 id="clubScheduleTitle"></h1>
      <button id="add-category-button" class="fancy-button" style="display: none;">ADD CATEGORY</button>
      <button id="reorder-button" style="display: none;">REORDER CATEGORIES</button>
      <p id="noResourcesMessage" class="fancy-label" style="display: none;">NO LINKS YET</p>
      <div id="resourcesContainer"></div>

      <div id="popup-overlay" style="display: none;"></div>

      <!-- Create Category Modal -->
      <div id="category-creation-modal" style="display: none;">
        <button class="modal-close-btn" id="cancel-category-button">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <h3>CREATE CATEGORY</h3>
        <label for="category-title-input">Category Name</label>
        <textarea id="category-title-input" placeholder="e.g. forms, slides, video/photo links" rows="1"></textarea>
        <div class="modal-actions">
          <button id="post-category-button" class="fancy-button">CREATE</button>
        </div>
      </div>

      <!-- Add Link Modal -->
      <div id="add-link-modal" style="display: none;">
        <button class="modal-close-btn" id="cancel-link-button">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <h3>ADD LINK</h3>
        <label for="link-title-input">Link Title</label>
        <textarea id="link-title-input" placeholder="e.g. Link to Event Photos" rows="1"></textarea>
        <label for="link-url-input">URL</label>
        <textarea id="link-url-input" placeholder="Paste link here" rows="1"></textarea>
        <div class="modal-actions">
          <button id="save-link-button" class="fancy-button">SAVE</button>
        </div>
      </div>

    </div>

    <script src="theme.js?v=12"></script>
    <script type="module" src="dialog.js"></script>
    <script type="module" src="links.js?v=18"></script>
    <!-- <script type="module" src="loading.js?v=2"></script> -->
  </body>
</html>
