<!DOCTYPE html>
<html>
  <head>
    <link href="styles.css?v=45" rel="stylesheet" />
    <meta name="theme-color" id="theme-color-meta" content="#1c375f">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />




    <style>
      body {
          font-family: var(--primary-font-family);
          padding-top: env(safe-area-inset-top);
          background: var(--bg-dark);
      }
    </style>
    
    <title>Club Connect | Edit</title>
  </head>
  <body>

    <div class="chat-header">
        <button id="back-button-edit" class="fancy-button">
          <i class="fa-solid fa-circle-left"></i>
        </button>
        <span class="chat-title">EDIT</span>
      </div>
      <form id = "createClubForm">
    <h1 class="pageTitle">EDIT DETAILS</h1>

    <div id="loading-overlay">
      <div id="loading-overlay-inner">
        <div class="loading-spinner"></div>
        <p>LOADING CLUB PAGE...</p>
      </div>
    </div>

    <div id="content">
      <div class="club-form-card">
        <h2>Edit Details</h2>

        <div class="club-form-section">
          <label for="school-name-edit">School Name</label>
          <input class="fancy-input" id="school-name-edit"
                placeholder="School name" required value="" autocomplete="off">
        </div>

        <div class="club-form-section">
          <label for="state-edit">State</label>
          <div class="state-dropdown-wrapper">
            <input class="fancy-input" id="state-edit"
                  placeholder="State name" required autocomplete="off">
            <div class="state-dropdown-list" id="state-dropdown-list-edit"></div>
          </div>
        </div>

        <div class="club-form-section">
          <label for="club-name-edit">Club Name</label>
          <input class="fancy-input" id="club-name-edit"
                placeholder="Club name" required autocomplete="off">
        </div>

        <div class="club-form-section">
          <label for="category-edit">Category</label>
          <div class="category-dropdown-wrapper">
            <input class="fancy-input" id="category-edit" placeholder="Select a category" autocomplete="off" readonly>
            <div class="category-dropdown-list" id="category-dropdown-list-edit"></div>
          </div>
        </div>

        <div class="club-form-section">
          <label for="main-activity-edit">Main Activity</label>
          <input class="fancy-input" id="main-activity-edit"
                placeholder="e.g. Chess, Robotics, Art" required autocomplete="off">
        </div>

        <div class="club-form-section">
          <label for="sponsor-edit">Club Sponsor</label>
          <input class="fancy-input" id="sponsor-edit"
                placeholder="Faculty or staff name" autocomplete="off">
        </div>

        <div class="club-form-section">
          <label for="description-edit">Description</label>
          <textarea id="description-edit" class="fancy-input"
                    rows="3" placeholder="A short description about your club…"
                    required maxlength="500"></textarea>
        </div>

        <!-- ── Visibility ───────────────────────────────── -->
        <div class="club-form-section">
          <label>Club Visibility</label>
          <div class="club-vis-strip-group" id="visibility-strip-group-edit">

            <div class="club-vis-strip" data-value="public">
              <span class="club-vis-strip-title">PUBLIC</span>
              <span class="club-vis-strip-sub">
                Anyone can find your club on the discovery page and request to join.
                You approve or deny each request.
              </span>
            </div>

            <div class="club-vis-strip" data-value="private">
              <span class="club-vis-strip-title">PRIVATE</span>
              <span class="club-vis-strip-sub">
                Your club won't appear in discovery. Members can only join using
                your club's unique access code.
              </span>
            </div>

          </div>
        </div>
        <!-- ─────────────────────────────────────────────── -->

        <div class="club-form-actions">
          <button id="update-club-button" type="submit" class="fancy-button">UPDATE</button>
          <button id="delete-club-button" type="button" class="fancy-button">DELETE</button>
        </div>
      </div>

      <hr style="background-color:transparent;height:150px;border:none;">
    </div>
    
          
    <script src="theme.js?v=10"></script>
    <script type="module" src="loading_instant.js"></script>
    <script type="module" src="dialog.js"></script> 
    <script type="module" src="club_edit_page.js?v=7"></script>

    

    
  </body>
</html>
