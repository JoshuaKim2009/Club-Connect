<!DOCTYPE html>
<html>
  <head>
    <link href="styles.css?v=19" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Connect | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
      .hidden {
        display: none;
      }
      .show {
        display: block;
      }
      
      #logoutButton {
        margin-bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      #logout-icon {
        font-size: 0.8em;
        position: relative;
        bottom: 1px;
      }

      .header-button {
        background: linear-gradient(#ffffff, #b3b3b3);
        font-family: var(--primary-font-family);
        font-size: 20px;
        color: black;
        border: 3px solid black;
        padding: 4px 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.15s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 0;
      }

      .header-button:active {
        transform: scale(0.92);
      }

      #main-page-title {
        margin-top: 100px;
      }

      #main-page-title {
        font-size: clamp(70px, 8vw, 100px);
        white-space: nowrap;
      }

      #home-section {
        font-family: var(--primary-font-family);
        padding: 10px;
        border: 3px solid black;
        border-radius: 10px;
        background: linear-gradient(#f0f0f0, #e0e0e0);
        box-shadow: 0px 6px 0px #000000;
        width: 85%;
        max-width: 390px;
        margin: 20px auto;
        text-align: center;
      }

      #home-section button {
        margin-bottom: 15px;
      }

      #home-section h3 {
        font-family: var(--primary-font-family);
        text-align: center;
        color: black;
        font-size: 25px;
        font-weight: normal;
        margin-bottom: 20px;
        padding-bottom: 8px;
        border-bottom: 2px dotted black;
        position: relative;
      }

      #home-section h3::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        bottom: -20px;
        height: 20px;
        background: linear-gradient(to bottom, rgba(128, 128, 128, 0.3), transparent);
        pointer-events: none;
      }
      
    </style>
  </head>
  <body>
    <div class="chat-header">
      <span class="chat-title">CLUB CONNECT</span>
      <button id="logoutButton" class="header-button">
        LOGOUT
        <i id="logout-icon" class="fa-solid fa-arrow-right-from-bracket"></i>
      </button>
    </div>

    <h1 id="main-page-title" class="pageTitle">CLUB CONNECT</h1>
    
    <div id="home-section">
      <h3 id="welcomeMessage">LOADING...</h3>
      <button id="club-button" class="fancy-button">MY CLUBS</button>
    </div>
    <hr style="background-color: transparent; height: 4px; border: none;">
    <!-- <button id="logoutButton" class="hidden fancy-button">
      LOGOUT
      <i id="logout-icon" class="fa-solid fa-arrow-right-from-bracket"></i>
    </button> -->


    
    <script type="module" src="dialog.js"></script> 
    <script type="module" src="script.js?v=2"></script>
  </body>
</html>
