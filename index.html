    <title>Club Connect | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
      .hidden {
        display: none;
      }
      .show {
        display: block;
      }
      
      .tagline-section {
        width: 80%;
        max-width: 300px;
        margin: 10px auto 20px;
        text-align: center;
      }

      .dotted-line {
        border: none;
        border-top: 2px dotted rgba(255,255,255,0.5);
        background: transparent;
        height: 0;
      }

      .tagline {
        font-family: var(--primary-font-family);
        font-size: 20px;
        color: white;
        font-weight: 50;
        text-align: center;
      }
      
      #logoutButton {
        margin-bottom: 20px;
      }

      #logout-icon {
        margin-left: 8px;
      }
      
    </style>
  </head>
  <body>
    <h1 id="main-page-title" class="pageTitle">CLUB CONNECT</h1>
    
    <div class="tagline-section">
      <hr class="dotted-line">
      <p class="tagline">A FREE school club management & organization app, simple enough for any student to pick up and use.</p>
      <hr class="dotted-line">
    </div>
    
    <h1 id="welcomeMessage" >LOADING...</h1>
    <button id="club-button" class="hidden fancy-button" >MY CLUBS</button>
    <hr style="background-color: transparent; height: 4px; border: none;">
    <button id="logoutButton" class="hidden fancy-button">LOGOUT</button>


    
    <script type="module" src="dialog.js"></script> 
    <script type="module" src="script.js"></script>
