<!DOCTYPE html>
<html>
  <head>
    <link href="styles.css?v=50" rel="stylesheet" />
    <meta name="theme-color" id="theme-color-meta" content="#1c375f">
    <link href="login.css?v=5" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Connect | Edit Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Amsterdam&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&display=swap" rel="stylesheet">

        #save-submit {
            width: 150px !important;
            align-self: center !important;
        }
    </style>
</head>
  <body>
    <div class="chat-header">
      <button type="button" id="back-button" class="fancy-button" onclick="history.length > 1 ? history.back() : window.location.href='index.html'">
        <i class="fa-solid fa-circle-left"></i>

      <span class="chat-title">EDIT ACCOUNT</span>

    <div class="auth-page-wrapper">

        <h1 class="auth-box-title">EDIT ACCOUNT</h1>
        <input type="text" class="fancy-login-input" placeholder="Display Name" id="displayName" />
        <hr class="auth-divider">
        <button id="save-submit" type="button" class="fancy-button">SAVE</button>
      </div>
    </div>

    <script src="theme.js?v=10"></script>
